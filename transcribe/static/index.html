<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>transcribe</title>
<link rel="icon" href="https://emojicdn.elk.sh/🎙️">
<link rel="apple-touch-icon" href="https://emojicdn.elk.sh/🎙️">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class'}</script>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1c1c1e;color:#e8e3d9}
  .title{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:-0.5px}
  .fade-in{animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes statusPulse{0%,100%{opacity:.35}50%{opacity:1}}
  .status-pulse{animation:statusPulse 1.4s ease-in-out infinite}
</style>
</head>
<body class="min-h-screen p-6">

<div class="max-w-3xl mx-auto">
  <h1 class="title text-2xl font-bold mb-6 text-[#e8e3d9]">transcribe</h1>

  <!-- Submit -->
  <div class="flex gap-3 mb-8">
    <input id="url-input" type="text" placeholder="Paste a YouTube URL…"
      class="flex-1 bg-[#2c2c2e] border border-[#3a3a3c] rounded-lg px-4 py-2.5 text-sm text-[#e8e3d9] placeholder-[#636366] focus:outline-none focus:ring-1 focus:ring-[#c79968]"/>
    <button onclick="submitJob()"
      class="bg-[#c79968] hover:opacity-90 text-[#1c1c1e] text-sm font-semibold px-5 py-2.5 rounded-lg transition-opacity">
      Submit
    </button>
  </div>

  <!-- Job list -->
  <div id="job-list" class="space-y-3"></div>
</div>

<script>
const STATUS_LABEL = {
  PENDING:      '○',
  DOWNLOADING:  '○',
  TRANSCRIBING: '○',
  SUCCESS:      '',
  FAILED:       '!',
};
const STATUS_TITLE = {
  PENDING:      'Pending',
  DOWNLOADING:  'Downloading',
  TRANSCRIBING: 'Transcribing',
  SUCCESS:      'Ready',
  FAILED:       'Failed',
};

async function submitJob() {
  const input = document.getElementById('url-input');
  const url = input.value.trim();
  if (!url) return;
  input.value = '';
  const res = await fetch('/api/jobs', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({url}),
  });
  if (!res.ok) { alert('Submit failed'); return; }
  await refresh();
}

async function retryJob(id) {
  await fetch(`/api/jobs/${id}/retry`, {method: 'POST'});
  await refresh();
}

async function deleteJob(id) {
  if (!confirm('Delete this job and its files?')) return;
  await fetch(`/api/jobs/${id}`, {method: 'DELETE'});
  await refresh();
}

function renderJob(job) {
  const label = STATUS_LABEL[job.status] ?? job.status;

  let actionsHtml = '';
  if (job.status === 'SUCCESS') {
    const dl = (kind, label) =>
      `<a href="/api/download/${job.job_id}/${kind}" download title="Download ${label}"
        class="text-sm font-semibold text-[#c79968] hover:opacity-70 transition-opacity no-underline">${label}</a>`;
    actionsHtml = `
      <div class="flex flex-wrap items-center gap-4 mt-3">
        ${job.files.mp4 ? dl('mp4', 'MP4') : ''}
        ${job.files.mp3 ? dl('mp3', 'MP3') : ''}
        ${job.files.srt ? dl('srt', 'SRT') : ''}
        <button onclick="window.open('/player/${job.job_id}','_blank')" title="Play"
          class="text-lg font-bold text-[#c79968] hover:opacity-70 transition-opacity leading-none">▸</button>
      </div>`;
  }

  let errorHtml = '';
  if (job.status === 'FAILED') {
    errorHtml = `
      <div class="mt-3 flex items-center gap-4">
        <button onclick="retryJob('${job.job_id}')" title="Retry"
          class="text-lg font-bold text-[#c79968] hover:opacity-70 transition-opacity leading-none">↻</button>
        ${job.error ? `<span class="text-xs text-[#aeaeb2] break-all">${job.error}</span>` : ''}
      </div>`;
  }

  return `<div data-job-id="${job.job_id}" class="fade-in bg-[#2c2c2e] rounded-xl px-5 py-4 shadow-[0_1px_4px_rgba(0,0,0,0.3)]">
    <div class="flex items-start justify-between gap-3">
      <div class="flex-1 min-w-0">
        <p class="text-base font-semibold text-[#e8e3d9] truncate">${job.title}</p>
        <p class="text-xs text-[#aeaeb2] truncate mt-0.5">${job.url}</p>
      </div>
      <div class="flex items-center gap-3 shrink-0">
        ${label ? `<span class="text-lg font-bold text-[#aeaeb2] font-mono leading-none ${job.status === 'PENDING' || job.status === 'DOWNLOADING' || job.status === 'TRANSCRIBING' ? 'status-pulse' : ''}" title="${STATUS_TITLE[job.status] || job.status}">${label}</span>` : ''}
        <button onclick="deleteJob('${job.job_id}')"
          class="text-[#636366] hover:text-[#e8e3d9] text-base leading-none transition-colors" title="Delete">✕</button>
      </div>
    </div>
    ${actionsHtml}${errorHtml}
  </div>`;
}

async function refresh() {
  const res = await fetch('/api/jobs');
  const jobs = await res.json();
  const list = document.getElementById('job-list');

  if (jobs.length === 0) {
    if (!list.querySelector('.empty-msg')) {
      list.innerHTML = '<p class="empty-msg text-center text-[#636366] text-sm py-16">No jobs yet. Paste a YouTube URL to start.</p>';
    }
    return;
  }

  const sorted = [...jobs].sort((a,b) => b.created_at.localeCompare(a.created_at));
  const existingIds = new Set([...list.querySelectorAll('[data-job-id]')].map(el => el.dataset.jobId));
  const newIds = new Set(sorted.map(j => j.job_id));

  // remove deleted
  for (const id of existingIds) {
    if (!newIds.has(id)) list.querySelector(`[data-job-id="${id}"]`)?.remove();
  }

  sorted.forEach((job, i) => {
    const html = renderJob(job);
    const existing = list.querySelector(`[data-job-id="${job.job_id}"]`);
    if (!existing) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      const el = tmp.firstElementChild;
      const ref = list.children[i];
      ref ? list.insertBefore(el, ref) : list.appendChild(el);
    } else {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      const newEl = tmp.firstElementChild;
      if (existing.innerHTML !== newEl.innerHTML) {
        existing.replaceWith(newEl);
      }
    }
  });
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitJob();
  });
  refresh();
  setInterval(refresh, 2000);
});
</script>
</body>
</html>
