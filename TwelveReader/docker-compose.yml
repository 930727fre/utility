services:
  backend:
    build: ./backend
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build: ./frontend
    container_name: twelvereader-frontend
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - default
      - my_network

networks:
  my_network:
    external: true
