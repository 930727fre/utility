services:
  twelvereader-backend:
    build: ./backend
    container_name: twelvereader-backend
    volumes:
      - ./data:/data
      - model-cache:/root/.cache
    environment:
      - DATA_DIR=/data
      - AUDIO_DIR=/app/audio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - default
      - my_network

  twelvereader-frontend:
    build: ./frontend
    container_name: twelvereader-frontend
    environment:
      - BACKEND_URL=http://twelvereader-backend:8000
    depends_on:
      - twelvereader-backend
    networks:
      - default
      - my_network

volumes:
  model-cache:

networks:
  my_network:
    external: true
